<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Vật Lý - Đã Hoàn Thiện Chuyên Nghiệp</title>
    <style>
    /* ======================================== */
    /* === calculator.css - Giao diện & FIX CUỘN DỌC === */
    /* ======================================== */
    
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #1c2533;
        margin: 0;
        padding: 20px;
    }

    .container {
        background-color: #2c394b; 
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4), 0 0 0 10px rgba(255, 255, 255, 0.05);
    }

    .calculator {
        width: 340px;
        border-radius: 15px;
        overflow: hidden;
        background-color: #1a1e26;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        display: block; 
    }

    /* --- Màn hình hiển thị (ĐÃ SỬA LỖI CUỘN DỌC) --- */
    .display-area {
        background-color: #12151c;
        padding: 20px;
        text-align: right;
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
        color: #ffffff;
        min-height: 110px;
        position: relative;
        opacity: 0; 
        transition: opacity 0.5s ease;
        
        /* **FIX: ẨN THANH CUỘN DỌC** */
        overflow-y: hidden; 
    }

    .display-area.on {
        opacity: 1;
    }

    #preview {
        font-size: 1.3em;
        color: #b0c4de;
        min-height: 30px;
        opacity: 0.8;
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 5px;
        scrollbar-width: none; 
        -ms-overflow-style: none; 
    }
    #preview::-webkit-scrollbar { 
        display: none;
    }

    #result {
        font-size: 2.8em;
        font-weight: 300;
        line-height: 1.1;
        overflow-x: hidden; /* Fix cuộn ngang */
        white-space: nowrap;
        display: none; 
    }

    .author-text {
        font-size: 0.35em;
        color: #5d6f8a;
        position: absolute;
        bottom: 5px;
        right: 20px;
    }

    /* --- Hiệu ứng Con trỏ Nhấp nháy --- */
    @keyframes blink-cursor {
        0%, 100% { border-right-color: transparent; }
        50% { border-right-color: #4cd964; }
    }

    #preview.typing-mode {
        font-size: 1.8em;
        font-weight: 500;
        color: #4cd964;
        border-right: 3px solid #4cd964; 
        animation: blink-cursor 0.5s step-end infinite;
        white-space: pre;
    }
    
    /* --- Bàn phím --- */
    .keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background-color: #1a1e26; 
    }

    .key {
        padding: 20px;
        font-size: 1.2em;
        border: none;
        cursor: pointer;
        transition: background-color 0.1s ease, transform 0.05s;
        background-color: #2e3b4e; 
        color: #ffffff;
    }

    .key:hover {
        background-color: #3d4a63;
    }

    .key:active {
        transform: scale(0.98);
        background-color: #4a5a73;
    }

    .utility {
        background-color: #38465d; 
        color: #b0c4de;
    }

    .utility:hover {
        background-color: #4c5770;
    }

    .operator {
        background-color: #ff9500;
        color: #ffffff;
        font-weight: 600;
    }

    .operator:hover {
        background-color: #ffb547;
    }

    .equal-sign {
        grid-column: span 2;
        background-color: #34c759;
        color: #ffffff;
        font-weight: 700;
    }

    .equal-sign:hover {
        background-color: #4ddb68;
    }
</style>
</head>
<body>

    <div class="container">
        <div class="calculator" id="calculatorApp">
            <div class="display-area" id="displayArea">
                <div id="preview"></div>
                <div id="result"></div>
                <div class="author-text">by.Nguyen Thuan IT</div>
            </div>
            <div class="keys">
                <button class="key utility" data-action="power-off">OFF</button>
                <button class="key utility" data-action="delete">DEL</button>
                <button class="key utility" data-action="percent">%</button>
                
                <button class="key operator" data-action="divide">÷</button>

                <button class="key" data-value="7">7</button>
                <button class="key" data-value="8">8</button>
                <button class="key" data-value="9">9</button>
                <button class="key operator" data-action="multiply">×</button>

                <button class="key" data-value="4">4</button>
                <button class="key" data-value="5">5</button>
                <button class="key" data-value="6">6</button>
                <button class="key operator" data-action="subtract">-</button>

                <button class="key" data-value="1">1</button>
                <button class="key" data-value="2">2</button>
                <button class="key" data-value="3">3</button>
                <button class="key operator" data-action="add">+</button>

                <button class="key utility" data-action="sign">+/-</button>
                <button class="key" data-value="0">0</button>
                <button class="key" data-value=".">.</button>
                
                <button class="key equal-sign" data-action="calculate">=</button>
            </div>
        </div>
    </div>

    <script>
        /* ======================================== */
        /* === calculator.js - Logic Đã Sửa Lỗi và Tối Ưu Chuyên Nghiệp === */
        /* ======================================== */
        document.addEventListener('DOMContentLoaded', () => {
            const resultDisplay = document.getElementById('result');
            const previewDisplay = document.getElementById('preview');
            const displayArea = document.getElementById('displayArea');
            const keys = document.querySelector('.keys');
            const powerButton = document.querySelector('[data-action="power-off"]'); 

            // Hằng số cho độ chính xác và hiển thị (Giúp code dễ bảo trì)
            const MAX_PRECISION_DIGITS = 10; // Làm tròn tối đa 10 chữ số sau dấu phẩy trong tính toán
            const MAX_DISPLAY_DIGITS = 15; // Số chữ số có nghĩa tối đa khi hiển thị
            const ERROR_MESSAGE = 'Error';

            let isPoweredOn = false;
            let displayValue = '0';
            let previewValue = '';
            let firstOperand = null;
            let operator = null;
            let waitingForSecondOperand = false;
            
            // --- Cải tiến: Hàm làm tròn số học chính xác ---
            function applyRounding(number) {
                if (typeof number !== 'number' || isNaN(number)) return String(number);
                // Sử dụng Math.round để tránh lỗi dấu phẩy động
                const factor = Math.pow(10, MAX_PRECISION_DIGITS);
                return String(Math.round(number * factor) / factor);
            }

            // --- Hiệu ứng Chạy Chữ (Typing Effect) ---
            function startTypingEffect(text, callback) {
                let i = 0;
                const typingArea = previewDisplay;
                const textToType = text + " "; 

                resultDisplay.style.display = 'none'; 
                typingArea.textContent = '';
                typingArea.classList.add('typing-mode'); 

                const speed = 70;

                function typeWriter() {
                    if (i < textToType.length) {
                        typingArea.textContent += textToType.charAt(i);
                        i++;
                        setTimeout(typeWriter, speed);
                    } else {
                        typingArea.classList.remove('typing-mode');
                        setTimeout(() => {
                            if (callback) callback();
                        }, 800);
                    }
                }
                typeWriter();
            }

            // --- Quản lý Trạng thái Mở/Tắt ---
            function powerOn() {
                if (isPoweredOn) {
                    resetCalculator(); 
                    return;
                }
                
                isPoweredOn = true;
                displayArea.classList.add('on');
                powerButton.textContent = 'AC'; 
                powerButton.setAttribute('data-action', 'clear');

                startTypingEffect("by.Nguyen Thuan IT", resetCalculator);
            }

            function powerOff() {
                isPoweredOn = false;
                displayArea.classList.remove('on');
                
                displayValue = '';
                previewValue = '';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                
                powerButton.textContent = 'OFF';
                powerButton.setAttribute('data-action', 'power-off');
                resultDisplay.style.display = 'none';
                previewDisplay.textContent = '';
            }
            
            // --- Cải tiến: Tối ưu hóa hiển thị số lớn/khoa học ---
            function updateDisplay() {
                if (!isPoweredOn) return;

                if (!isNaN(parseFloat(displayValue))) {
                    const number = parseFloat(displayValue);

                    if (displayValue === ERROR_MESSAGE) {
                        resultDisplay.textContent = ERROR_MESSAGE;
                    }
                    // Kiểm tra và chuyển sang dạng khoa học nếu số quá lớn/quá bé
                    else if (displayValue.includes('e') || 
                        (Math.abs(number) >= Math.pow(10, MAX_DISPLAY_DIGITS)) || 
                        (Math.abs(number) > 0 && Math.abs(number) < Math.pow(10, -10))) 
                    {
                        resultDisplay.textContent = number.toExponential(MAX_DISPLAY_DIGITS - 6);
                    } else {
                        // Giới hạn chữ số có nghĩa và loại bỏ số 0 thừa
                        resultDisplay.textContent = number.toPrecision(MAX_DISPLAY_DIGITS).replace(/\.?0+$/, '');
                    }
                } else {
                    resultDisplay.textContent = displayValue;
                }
                
                if (!previewDisplay.classList.contains('typing-mode')) {
                    previewDisplay.textContent = previewValue;
                }
            }
            
            function resetCalculator() {
                displayValue = '0';
                previewValue = '';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                
                previewDisplay.textContent = ''; 
                resultDisplay.style.display = 'block';
                updateDisplay();
            }
            
            function inputDigit(digit) {
                if (waitingForSecondOperand === true) {
                    displayValue = digit;
                    waitingForSecondOperand = false;
                } else {
                    if (displayValue === ERROR_MESSAGE) {
                        displayValue = digit;
                    } else {
                        displayValue = displayValue === '0' ? digit : displayValue + digit;
                    }
                }
                updateDisplay();
            }

            function inputDecimal(dot) {
                if (waitingForSecondOperand === true) {
                    displayValue = '0.';
                    waitingForSecondOperand = false;
                } else if (!displayValue.includes(dot)) {
                    displayValue += dot;
                }
                updateDisplay();
            }

            function calculate(first, second, op) {
                if (op === '+') return first + second;
                if (op === '-') return first - second;
                if (op === '×') return first * second;
                if (op === '÷') {
                    if (second === 0) return ERROR_MESSAGE;
                    return first / second;
                }
                return second;
            }

            function handleOperator(nextOperator) {
                const inputValue = parseFloat(displayValue);

                if (operator && waitingForSecondOperand) {
                    operator = nextOperator;
                    previewValue = `${firstOperand} ${operator}`;
                    updateDisplay();
                    return;
                }

                if (firstOperand === null) {
                    firstOperand = inputValue;
                } else if (operator) {
                    const result = calculate(firstOperand, inputValue, operator);
                    
                    if (result === ERROR_MESSAGE) {
                        displayValue = result;
                        firstOperand = null;
                        operator = null;
                        waitingForSecondOperand = false;
                        previewValue = '';
                        updateDisplay();
                        return;
                    }
                    
                    displayValue = applyRounding(result);
                    firstOperand = parseFloat(displayValue);
                }

                waitingForSecondOperand = true;
                operator = nextOperator;
                previewValue = `${firstOperand} ${operator}`;
                updateDisplay();
            }

            function handleCalculate() {
                if (firstOperand === null || operator === null || waitingForSecondOperand) {
                    return;
                }

                const inputValue = parseFloat(displayValue);
                const result = calculate(firstOperand, inputValue, operator);

                if (result === ERROR_MESSAGE) {
                    displayValue = result;
                    updateDisplay();
                } else {
                    displayValue = applyRounding(result);
                    updateDisplay();
                }
                
                previewValue = '';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = true;
            }
            
            function deleteLastDigit() {
                if (displayValue === ERROR_MESSAGE || waitingForSecondOperand) return;
                
                displayValue = displayValue.slice(0, -1);
                if (displayValue.length === 0 || displayValue === '-') {
                    displayValue = '0';
                }
                updateDisplay();
            }
            
            function toggleSign() {
                if (displayValue === '0' || displayValue === ERROR_MESSAGE) return;

                displayValue = String(parseFloat(displayValue) * -1);
                updateDisplay();
            }
            
            function calculatePercent() {
                if (displayValue === ERROR_MESSAGE) return;
                const currentValue = parseFloat(displayValue);

                if (firstOperand === null) {
                    displayValue = applyRounding(currentValue / 100);
                } else {
                    const percentValue = firstOperand * (currentValue / 100);
                    displayValue = applyRounding(percentValue);
                    waitingForSecondOperand = false; 
                }
                updateDisplay();
            }

            // --- SỬA LỖI VÀ HOÀN THIỆN LOGIC XỬ LÝ SỰ KIỆN NÚT BẤM ---
            keys.addEventListener('click', (event) => {
                const { target } = event;
                const { action, value } = target.dataset; 

                if (!target.matches('button')) return; 

                // 1. Xử lý Nút ON/OFF/AC
                if (action === 'power-off' || action === 'clear') {
                    if (action === 'power-off') {
                        powerOn(); 
                    } else { // action === 'clear' (khi máy đang mở)
                        resetCalculator(); 
                    }
                    return;
                }

                // 2. Ngăn các nút khác hoạt động khi máy tắt hoặc đang chạy hiệu ứng
                if (!isPoweredOn || previewDisplay.classList.contains('typing-mode')) return;

                // 3. Xử lý các nút số và dấu thập phân
                if (value) {
                    if (value === '.') {
                        inputDecimal('.');
                    } else {
                        inputDigit(value);
                    }
                } 
                // 4. Xử lý các nút chức năng/toán tử
                else if (action) {
                    switch (action) {
                        case 'delete':
                            deleteLastDigit();
                            break;
                        case 'sign':
                            toggleSign();
                            break;
                        case 'percent':
                            calculatePercent();
                            break;
                        case 'calculate':
                            handleCalculate();
                            break;
                        // Xử lý các toán tử (+, -, ×, ÷)
                        case 'divide':
                        case 'multiply':
                        case 'subtract':
                        case 'add':
                            handleOperator(target.textContent);
                            break;
                    }
                }
            });

            // Khởi tạo máy tính ở trạng thái TẮT
            powerOff();
        });
    </script>
</body>
</html>

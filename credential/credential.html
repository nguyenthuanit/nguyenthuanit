<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Cloud - macOS Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="credential.css">
    <link rel="stylesheet" href="teminal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <div id="topBar">
        <div class="top-bar-left">
            <span style="font-weight: 600;"><i class="fa-brands fa-apple" style="margin-right: 8px;"></i>OS Cloud</span>
            <div id="connectionStatus"></div>
        </div>
        <div class="top-bar-right">
            <span id="clockDisplay"></span>
            <i class="fa-solid fa-power-off" id="powerBtn" title="Start System"></i>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="loginOverlay">
        <div class="login-form">
            <div class="login-title-bar"><span>Network Connection</span></div>
            <div class="login-body">
                <div class="form-group">
                    <label for="ipName">IP Network:</label>
                    <input type="text" id="ipName" value="\\103.199.113" readonly>
                </div>
                <div class="form-group">
                    <label for="ipPass">Password (Mặc định: để trống hoặc nhập bất kỳ):</label>
                    <input type="password" id="ipPass" autofocus>
                </div>
                <button id="connectBtn">Connect</button>
            </div>
        </div>
    </div>

    <!-- 1. EXPLORER WINDOW -->
    <div class="os-window explorer-window" id="explorerWindow" style="display: none; top: 8vh; left: 8vw; width: 65vw; height: 70vh;">
        <div class="window-title-bar" data-window="explorerWindow">
            <div class="window-controls-macos">
                <div class="traffic-light close" onclick="WindowManager.close('explorerWindow')"></div>
                <div class="traffic-light minimize" onclick="WindowManager.minimize('explorerWindow')"></div>
                <div class="traffic-light maximize" onclick="WindowManager.maximize('explorerWindow')"></div>
            </div>
            <span class="window-title-text" id="explorerTitleText">Documents</span>
        </div>
        
        <div class="explorer-body-container">
            <div class="explorer-sidebar">
                <ul class="sidebar-list" id="sidebarFavorites"></ul>
            </div>
            <div class="explorer-content-pane">
                <div class="explorer-header">
                    <div class="nav-controls">
                        <button class="header-btn" id="btnNavBack" title="Back"><i class="fa-solid fa-chevron-left"></i></button>
                        <div id="breadcrumbBar" class="breadcrumb-bar"></div>
                    </div>
                    <div class="view-controls">
                        <button class="header-btn" id="btnNewFolder" title="New Folder"><i class="fa-solid fa-folder-plus"></i></button>
                        <button class="header-btn" id="btnNewFile" title="New File"><i class="fa-solid fa-file-circle-plus"></i></button>
                        <span class="divider"></span>
                        <button class="header-btn active" id="viewGridBtn" title="Grid View"><i class="fa-solid fa-grip"></i></button>
                        <button class="header-btn" id="viewListBtn" title="List View"><i class="fa-solid fa-list"></i></button>
                    </div>
                </div>
                <div class="explorer-body grid-view" id="explorerBody"></div>
            </div>
        </div>
        <div class="resize-handle" data-window="explorerWindow"></div>
    </div>

    <!-- 2. TEXT EDITOR WINDOW -->
    <div class="os-window text-editor-window" id="textEditorWindow" style="display: none; top: 12vh; left: 18vw; width: 55vw; height: 60vh;">
        <div class="window-title-bar" data-window="textEditorWindow" style="background: #1e1f29; color: #fff;">
            <div class="window-controls-macos">
                <div class="traffic-light close" onclick="WindowManager.close('textEditorWindow')"></div>
                <div class="traffic-light minimize" onclick="WindowManager.minimize('textEditorWindow')"></div>
                <div class="traffic-light maximize" onclick="WindowManager.maximize('textEditorWindow')"></div>
            </div>
            <span class="window-title-text" id="textEditorFileName">Untitled.txt</span>
        </div>
        <div class="editor-body">
            <textarea id="editorTextArea" placeholder="Nhập nội dung văn bản hoặc code tại đây..."></textarea>
        </div>
        <div class="editor-footer">
            <button class="btn-secondary" onclick="WindowManager.close('textEditorWindow')">Close</button>
            <button id="editorSaveBtn">Save Changes</button>
        </div>
        <div class="resize-handle" data-window="textEditorWindow"></div>
    </div>

    <!-- 3. TERMINAL WINDOW -->
    <div class="os-window terminal-window theme-matrix" id="terminalWindow" style="display: none; top: 16vh; left: 25vw; width: 55vw; height: 55vh;">
        <div class="window-title-bar" data-window="terminalWindow" style="background: #111; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="window-controls-macos">
                <div class="traffic-light close" onclick="WindowManager.close('terminalWindow')"></div>
                <div class="traffic-light minimize" onclick="WindowManager.minimize('terminalWindow')"></div>
                <div class="traffic-light maximize" onclick="WindowManager.maximize('terminalWindow')"></div>
            </div>
            <span class="window-title-text"><i class="fa-solid fa-terminal" style="color: #00ff41; margin-right: 6px;"></i>bash - NguyenthuanIT (Simulated)</span>
        </div>
        <div class="terminal-body" style="position: relative; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background-color: var(--main-bg); color: var(--main-color);">
            <div id="terminal" tabindex="0" style="flex-grow: 1; height: 100%; overflow-y: auto; padding: 15px; box-sizing: border-box;">
                <div id="history"></div>
                <div id="input-line">
                    <span id="prompt">></span>
                    <input type="text" id="command-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                    <span class="cursor"></span>
                </div>
            </div>
            <!-- Overlay cho trình soạn thảo Nano (Đã sửa vị trí không che Title Bar) -->
            <div id="editor-overlay" style="display: none; top: 0;">
                <textarea id="editor-textarea"></textarea>
                <div id="editor-statusbar">Press Ctrl+S to Save, Ctrl+X to Exit</div>
            </div>
        </div>
        <div class="resize-handle" data-window="terminalWindow"></div>
    </div>

    <!-- macOS Dock -->
    <div id="dock" style="display: none;">
        <div class="dock-item" data-app="explorerWindow" onclick="WindowManager.toggle('explorerWindow')">
            <i class="fa-solid fa-folder" style="color: #007aff;"></i>
            <span class="dock-tooltip">Finder</span>
            <div class="dock-dot"></div>
        </div>
        <div class="dock-item" data-app="terminalWindow" onclick="WindowManager.toggle('terminalWindow')">
            <i class="fa-solid fa-terminal" style="color: #50fa7b; background: #282a36; padding: 5px; border-radius: 8px;"></i>
            <span class="dock-tooltip">Terminal</span>
            <div class="dock-dot"></div>
        </div>
        <div class="dock-item" data-app="textEditorWindow" onclick="WindowManager.toggle('textEditorWindow')">
            <i class="fa-solid fa-file-pen" style="color: #ff9500;"></i>
            <span class="dock-tooltip">Text Editor</span>
            <div class="dock-dot"></div>
        </div>
    </div>

    <!-- Modals & Overlays -->
    <div id="newItemModal" class="modal-overlay" style="display: none;">
        <div class="login-form">
            <div class="login-title-bar"><span id="modalTitle">Create New</span></div>
            <div class="login-body">
                <div class="form-group">
                    <label id="modalLabel" for="itemNameInput">Name:</label>
                    <input type="text" id="itemNameInput" autofocus>
                </div>
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="document.getElementById('newItemModal').style.display='none'">Cancel</button>
                    <button id="newItemConfirmBtn">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div id="quickLookModal" style="display: none;" onclick="this.style.display='none'">
        <div class="quick-look-content" onclick="event.stopPropagation()">
            <img id="quickLookImage" src="" alt="Preview"/>
            <p id="quickLookFileName"></p>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" style="display: none;">
        <ul>
            <li data-action="new-folder"><i class="fa-solid fa-folder-plus"></i> New Folder</li>
            <li data-action="new-file"><i class="fa-solid fa-file-lines"></i> New File</li>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">
            <li data-action="rename"><i class="fa-solid fa-pen"></i> Rename</li>
            <li data-action="delete" class="danger"><i class="fa-solid fa-trash-can"></i> Delete</li>
        </ul>
    </div>

    <!-- Nhúng các script theo đúng thứ tự phụ thuộc -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="teminal.js"></script>
    <script src="commands-fs.js"></script>
    <script src="commands-sys.js"></script>
    <script src="fileExplorer.js"></script>
</body>
</html>
